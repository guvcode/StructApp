services:
  - type: web
    name: structapp-api
    env: node
    region: ohio
    plan: free
    rootDir: apps/api-server
    buildCommand: npm install
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        fromService:
          name: structapp-web-client
          type: web
          property: host
      - key: NODE_ENV
        value: production

  - type: web
    name: structapp-web-client
    region: ohio
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: apps/web-client
    envVars:
      - key: VITE_API_URL
        fromService:
          name: structapp-api
          type: web
          property: host
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
