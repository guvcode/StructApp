services:
  - type: web
    name: structapp-api
    env: node
    region: ohio
    plan: free
    buildCommand: npm install
    startCommand: npm run start --workspace=apps/api-server
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        fromService:
          name: structapp-web-client
          type: web
          property: host
      - key: NODE_ENV
        value: production
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false

  - type: web
    name: structapp-web-client
    env: static
    buildCommand: cd ../.. && npm install && cd apps/web-client && npx vite build
    staticPublishPath: ./dist
    rootDir: apps/web-client
    envVars:
      - key: VITE_API_URL
        fromService:
          name: structapp-api
          type: web
          property: host
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
